services:

  # ── MongoDB ────────────────────────────────────────────────
  # Runs as a single-node replica set (rs0) so multi-document transactions
  # are available. A standalone MongoDB does not support transactions.
  mongo:
    image: mongo:7
    container_name: finan-mongo
    restart: unless-stopped
    # Cap WiredTiger cache to 512 MB so MongoDB doesn't consume all RAM on a small VPS.
    # Default is 50% of (system RAM - 1 GB) which can be 1.5-3 GB on a 4-8 GB server.
    command: ["--replSet", "rs0", "--bind_ip_all", "--wiredTigerCacheSizeGB", "0.5"]
    volumes:
      - mongo_data:/data/db
    networks:
      - finan-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Replica-set init (runs once, exits 0) ──────────────────
  # Initiates the rs0 replica set after mongo is healthy.
  # Idempotent: rs.status() succeeds if already initiated, skipping rs.initiate().
  # backend depends on this completing before it starts.
  mongo-init:
    image: mongo:7
    container_name: finan-mongo-init
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - finan-net
    command: >
      mongosh --host mongo:27017 --eval
      "try { rs.status(); print('replica set already initiated') }
       catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }); print('replica set initiated') }"

  # ── AI service (FastAPI) ─────────────────────────────────────
  ai:
    image: ghcr.io/chud-lori/finan-app-ai:latest
    build:
      context: ./finance-management-ai
      dockerfile: Dockerfile
    container_name: finan-ai
    restart: unless-stopped
    # Not exposed to host — backend reaches it via Docker network as http://ai:3002
    networks:
      - finan-net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Backend (Express) ───────────────────────────────────────
  backend:
    image: ghcr.io/chud-lori/finan-app-backend:latest
    build:
      context: ./finance-management
      dockerfile: Dockerfile
    container_name: finan-be
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DB_URI: ${DB_URI:-mongodb://mongo:27017/finan?replicaSet=rs0}
      SECRET_TOKEN: ${SECRET_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      FE_URL: ${FE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@lori.my.id}
      SENTRY_DSN: ${SENTRY_DSN}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai:3002}
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      ai:
        condition: service_started
    networks:
      - finan-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    image: ghcr.io/chud-lori/finan-app-frontend:latest
    build:
      context: ./finance-management-fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
    container_name: finan-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finan-net
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Watchtower ──────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: finan-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      DOCKER_CONFIG: /config.json
      DOCKER_API_VERSION: "1.44"
    networks:
      - finan-net
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  mongo_data:

networks:
  finan-net:
    driver: bridge
