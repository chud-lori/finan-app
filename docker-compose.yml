services:

  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: finan-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - finan-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Express) ───────────────────────────────────────
  backend:
    image: ghcr.io/chud-lori/finan-app-backend:latest
    build:
      context: ./finance-management
      dockerfile: Dockerfile
    container_name: finan-be
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      DB_URI: ${DB_URI:-mongodb://mongo:27017/finan}
      SECRET_TOKEN: ${SECRET_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/auth/google/callback}
      FE_URL: ${FE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@lori.my.id}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - finan-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Frontend (Next.js) ──────────────────────────────────────
  frontend:
    image: ghcr.io/chud-lori/finan-app-frontend:latest
    build:
      context: ./finance-management-fe
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
    container_name: finan-fe
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finan-net
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # ── Watchtower ──────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: finan-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
      DOCKER_CONFIG: /config.json
      DOCKER_API_VERSION: "1.44"
    networks:
      - finan-net

volumes:
  mongo_data:

networks:
  finan-net:
    driver: bridge
