name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-backend:
    name: Backend — install & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-management
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finance-management/package-lock.json
      - run: npm ci
      - run: npm test

  build-frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-management-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: finance-management-fe/package-lock.json
      - run: npm ci
      - name: Build (with placeholder env vars)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder
        run: npm run build
