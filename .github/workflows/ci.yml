name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # Detect which parts of the monorepo actually changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai:       ${{ steps.filter.outputs.ai }}
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            backend:
              - 'finance-management/**'
            frontend:
              - 'finance-management-fe/**'
            ai:
              - 'finance-management-ai/**'

  lint-backend:
    name: Backend — install & test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-management
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: finance-management/package-lock.json
      - run: npm ci
      - run: npm test

  lint-ai:
    name: AI service — install & import check
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-management-ai
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: finance-management-ai/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import check
        run: python3 -c "from models.anomaly import detect_anomalies; from models.forecast import forecast_month_spend; print('OK')"

  build-frontend:
    name: Frontend — build check
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finance-management-fe
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: finance-management-fe/package-lock.json
      - run: npm ci
      # Cache Next.js compiled output — skips recompiling unchanged pages/routes
      - uses: actions/cache@v4
        with:
          path: finance-management-fe/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('finance-management-fe/package-lock.json') }}-${{ hashFiles('finance-management-fe/app/**', 'finance-management-fe/components/**', 'finance-management-fe/lib/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('finance-management-fe/package-lock.json') }}-
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder
        run: npm run build
